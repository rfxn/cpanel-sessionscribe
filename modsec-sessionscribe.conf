#   reload behavior depends on local config; validate `apachectl -t` and
#   reload in a maintenance window. The author and Nexcess Engineering
#   accept no liability for any downtime, false-block, or service impact
#   arising from use, misuse, or modification of these rules.
#
# Two distinct surfaces are mitigated. ONE configuration, two rule families:
#
#   CVE-2026-41940    (disclosed 2026-04-28)
#     Researcher: Sina Kheirkhah (@SinSinology) / watchTowr Labs.
#     `Authorization: Basic <b64>` where the base64-decoded payload contains
#     CRLF, combined with a `whostmgrsession=:NAME` cookie that lacks the
#     `,OBHEX` suffix. cpsrvd writes the multi-line password verbatim into
#     the on-disk session file when the ob-part is absent (the encoder is
#     short-circuited); injected lines become canonical session keys.
#     Outcome: full session forgery to root.
#     Blocked by rule 1500030; secondary detection at 1500031.
#
#   WhmScribe-A       (disclosed 2026-04-28)
#     Researcher: Ryan MacDonald, Nexcess Engineering <rmacdonald@nexcess.net>
#                 Ryan MacDonald, rfxn | forged in prod | <ryan@rfxn.com>
#     `Authorization: WHM <user>:<token>` causes cpsrvd to commit the
#     username to the access_log identity slot before token validation.
#     The ACL gate holds across the WHM dispatch families - bounded to
#     arbitrary log identity injection.
#     Blocked by rules 1500010 / 1500020 / 1500021 from non-trusted sources.
#
# Version : 1.4.0
# Author  : Nexcess Engineering <rmacdonald@nexcess.net>
# Vendor  : KB 40073787579671   |   CVE-2026-41940
# Rules   : 1500010 confirmed-paths    1500020 WebSocket    1500021 SSE
#           1500030 Authorization: Basic CRLF        (deny - required)
#           1500031 whostmgrsession invalid OBHEX    (deny - secondary)
#
# ============================================================================
# 1. INSTALL
# ============================================================================
#
#   1.1  Verify ModSecurity is loaded:
#          httpd -M 2>&1 | grep security2_module
#
#   1.2  Drop the rules into cPanel's operator slot. The auto-managed
#        /etc/apache2/conf.d/modsec2.conf only Includes:
#            /etc/apache2/conf.d/modsec/modsec2.user.conf   (THIS file's home)
#            /etc/apache2/conf.d/modsec/modsec2.cpanel.conf (vendor OWASP3)
#
#        APPEND the rule block (everything after the "RULES" marker far below)
#        into modsec2.user.conf - DO NOT overwrite if other operator rules
#        already live there:
#
#          # New install (file is empty by default):
#          cp modsec-sessionscribe.conf \
#             /etc/apache2/conf.d/modsec/modsec2.user.conf
#
#          # Append to an existing user.conf:
#          sed -n '/^# === RULES ===/,$p' modsec-sessionscribe.conf \
#            >> /etc/apache2/conf.d/modsec/modsec2.user.conf
#
#   1.3  EDIT THE TRUST LIST in each block rule (1500010 / 1500020 / 1500021).
#        Default ships with loopback only (127.0.0.0/8, ::1). Without your
#        management CIDRs, every external API token client will be 403'd.
#        Find each occurrence of:
#
#          SecRule REMOTE_ADDR "!@ipMatch 127.0.0.0/8,::1"
#
#        and extend the comma-list, e.g.:
#
#          SecRule REMOTE_ADDR "!@ipMatch 127.0.0.0/8,::1,10.0.0.0/8,192.0.2.5/32"
#
#   1.4  Validate config and reload Apache:
#
#          apachectl -t                                # syntax must be OK
#          /usr/local/cpanel/scripts/restartsrv_httpd  # graceful reload
#
#   1.5  Confirm the file is in the include chain:
#
#          apachectl -t -D DUMP_INCLUDES 2>&1 | grep modsec2.user.conf
#
# ============================================================================
# 2. VALIDATE  (run from an UNTRUSTED source IP - not the host itself)
# ============================================================================
#
#   HOST=cpanel.example.com    # hostname or IP of the target cPanel server
#
#   # ---- WhmScribe-A coverage (rules 1500010/20/21) ----
#   curl -sk -o /dev/null -w 'login:    %{http_code} (expect non-403)\n' \
#        "https://$HOST/login/"
#
#   curl -sk -o /dev/null -w 'json-api: %{http_code} (expect 403)\n' \
#        -H 'Authorization: WHM root:bogus-token' \
#        "https://$HOST/json-api/loadavg"
#
#   curl -sk -o /dev/null -w 'execute:  %{http_code} (expect 403)\n' \
#        -H 'Authorization: WHM root:bogus-token' \
#        "https://$HOST/execute/StatsBar/get_stats"
#
#   curl -sk -o /dev/null -w 'cpxfer:   %{http_code} (expect 403)\n' \
#        -H 'Authorization: WHM root:bogus-token' \
#        "https://$HOST/acctxferrsync/_a/_b?username=daemon"
#
#   curl -sk -o /dev/null -w 'cpanel:   %{http_code} (expect non-403)\n' \
#        -H 'Authorization: cpanel root:bogus-token' \
#        "https://$HOST/json-api/cpanel?cpanel_jsonapi_module=Email"
#
#   curl -sk -o /dev/null -w 'other:    %{http_code} (expect non-403)\n' \
#        -H 'Authorization: WHM root:bogus-token' \
#        "https://$HOST/something-else"
#
#   # ---- 1500030 coverage (Authorization: Basic CRLF) ----
#   # Build a Basic-auth payload with embedded CRLF; ModSec must reject in
#   # phase:1 before cpsrvd ever decodes the bytes server-side.
#   B64=$(printf 'root:x\r\nKEY=VALUE' | base64 -w0)
#   curl -sk -o /dev/null -w 'cve-crlf:  %{http_code} (expect 403)\n' \
#        -H "Authorization: Basic $B64" "https://$HOST/"
#
#   # Negative control: well-formed Basic auth must NOT 403.
#   B64OK=$(printf 'root:bogus-alphanumeric-token' | base64 -w0)
#   curl -sk -o /dev/null -w 'basic-ok:  %{http_code} (expect non-403)\n' \
#        -H "Authorization: Basic $B64OK" "https://$HOST/"
#
#   # ---- 1500031 coverage (whostmgrsession invalid OBHEX) ----
#   # All five vulnerable cookie shapes must trigger the rule; the legitimate
#   # cookie must NOT. Note: when $HOST is a WHM service-subdomain (whm.<dom>),
#   # cPanel's ErrorDocument cascade rewrites ModSec's 403 to the cpsrvd WHM-
#   # login page, so the client sees `HTTP/1.1 401 Access Denied`. The rule
#   # still intercepted in phase:1 -- confirm via the error_log grep below.
#   # Test against the WHM service-subdomain (Apache+ModSec is in path).
#   HEX64='0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
#   for shape in ':NAME' ':NAME,' ':NAME,GHIJ' ':NAME,ABCDEF' ":NAME,${HEX64}e"; do
#     curl -sk -o /dev/null -w "no-ob[$shape]: %{http_code}\n" \
#          -H "Cookie: whostmgrsession=$shape" "https://$HOST/"
#   done
#   curl -sk -o /dev/null -w 'legit-ob:        %{http_code} (cookie passes ModSec)\n' \
#        -H "Cookie: whostmgrsession=%3aNAME%2c${HEX64}" "https://$HOST/"
#
# On the host, confirm the audit trail (rule firings authoritative, not the
# wire HTTP code):
#
#   grep -E '\[id "150003[01]"\]' /usr/local/apache/logs/error_log | tail
#   grep -E '\[id "150001[0-9]"\]' /usr/local/apache/logs/error_log | tail
#
# 1500031 fires once per attack shape, with the decoded cookie value in the
# `data ... cookie=...` field. The negative-control `legit-ob` case must NOT
# appear in either grep.
#
# Trust-list spot-check (run ON the host):
#
#   curl -sk -o /dev/null -w '%{http_code}\n' \
#        -H 'Authorization: WHM root:bogus-token' \
#        https://127.0.0.1:443/json-api/loadavg
#   # expect: non-403 (loopback bypassed by trust list)
#
# ============================================================================
# 3. WHAT THIS BLOCKS  /  WHAT IT DOES NOT
# ============================================================================
#
# !! IMPORTANT - REQUIRED COMPANION CONTROL !!
#
#   These rules run inside Apache. cpsrvd listens directly on TCP ports
#   2082, 2083, 2086, 2087, 2095, 2096 and is a separate daemon -- a
#   CVE-2026-41940 attack against any of those ports DOES NOT TRAVERSE
#   APACHE and DOES NOT HIT THESE RULES. The watchTowr public PoC fires
#   straight at port 2087.
#
#   On an unpatched host, deploying these rules WITHOUT also firewalling
#   ports 2082-2096 leaves the bug fully exploitable on the cpsrvd ports.
#   Apply section 5 (port lockdown by management CIDR), or upgrade to a
#   patched build:
#       11.110.0.97 / 11.118.0.63 / 11.126.0.54 /
#       11.132.0.29 / 11.134.0.20 / 11.136.0.5
#   Tiers 112/114/116/120/122/124/128/130 have NO patch (must upgrade
#   the major series, migrate, or firewall the cpsrvd ports).
#
# BLOCKS:
#   1500030 (any source, any path)
#     Authorization: Basic <b64> where the base64-decoded payload contains
#     CR or LF. The CVE-2026-41940 injection primitive. No legitimate Basic
#     auth value decodes to bytes with newlines, so this rule has no
#     trust-list bypass.
#
#   1500031 (any source, any path)
#     whostmgrsession cookie whose value does NOT end with `,<1-64
#     lowercase hex chars>`. Mirrors the inverse of Cpanel/Session/Load.pm
#     get_ob_part() at line 122:
#         if ( $$session_name_ref =~ s/,([0-9a-f]{1,64})$// ) { $ob = $1; }
#     Any cookie shape that fails that regex leaves $ob undef, which on
#     line 93 short-circuits the encoder construction:
#         my $encoder = $ob && Cpanel::Session::Encoder->new('secret' => $ob);
#     With the encoder skipped, saveSession() writes the password field
#     verbatim - the gating condition for 1500030's CRLF write to land in
#     the on-disk session file. Catches the five vulnerable cookie shapes
#     (no comma, trailing comma, non-hex tail, uppercase hex, >64-char
#     hex tail) by negative-matching the safe shape. Non-firing on the
#     legitimate %3aNAME%2cOBHEX browser cookie.
#     1500030 closes the CVE chain on its own; 1500031 is defense-in-depth
#     and surfaces probing-for-shape behavior.
#
#   1500010 / 1500020 / 1500021 (when source NOT in trust list)
#     Authorization: WHM <user>:<token> on:
#       /json-api/*  /execute/*  /acctxfer{rsync,stream,dsync}/*
#       /Shell  /CommandStream  /MysqlDump  /TarBackup  /TarRestore
#       /LogStreamer  /PluginLog
#       /sse/*
#
# DOES NOT BLOCK:
#   Browser logins / cookie-based sessions on cpanel.<domain>, whm.<domain>,
#     webmail.<domain>:443 - these carry no Authorization header.
#   Authorization: cpanel <user>:<token> - the cpanel auth-type is not bug-affected.
#   Trusted-source API tokens (loopback + your @ipMatch list) for the
#     WhmScribe-A rules. 1500030 / 1500031 have no trust-list bypass; the
#     CVE primitive is unconditional.
#   Direct connections to cpsrvd ports 2082-2096 - Apache is not in the path,
#     so the rules do not run. See the IMPORTANT callout above; pair with a
#     firewall primitive (section 5) or ensure cpsrvd is on a patched build
#     (vendor patch is the only fix for the direct-port surface).
#
# ============================================================================
# 4. (OPTIONAL) ENABLE PROXY SUBDOMAINS so users keep WHM/cPanel access
# ============================================================================
#
# Required only if you also plan to firewall-off cpsrvd ports 2082-2096.
# Without proxy subdomains, blocking the cpsrvd ports kills GUI access for
# users who connect via https://host:2087/.
#
#   whmapi1 set_tweaksetting key=proxysubdomains value=1
#   /scripts/proxydomains add                       # provision DNS for all accounts
#   dig +short cpanel.<a-customer-domain> @127.0.0.1   # spot-check zone
#
# After this, customers can reach WHM at https://whm.<their-domain>/ and
# cPanel at https://cpanel.<their-domain>/ - Apache (with these rules) handles
# the proxy. New accounts inherit the setting automatically.
#
# ============================================================================
# 5. (OPTIONAL) FIREWALL OFF cpsrvd PORTS 2082-2096  (csf or apf)
# ============================================================================
#
# Apply ONLY after section 4 is live and you've confirmed proxy access works.
# Apache (with these ModSec rules) becomes the sole ingress for WHM/cPanel.
#
# Ports: 2082 (cP non-SSL) 2083 (cP SSL) 2086 (WHM non-SSL) 2087 (WHM SSL)
#        2095 (Webmail non-SSL) 2096 (Webmail SSL)
#
# ---- csf ----
#   # 5.1  Edit /etc/csf/csf.conf - remove 2082,2083,2086,2087,2095,2096 from TCP_IN
#   # 5.2  Allow trusted CIDRs back in:
#         echo 'tcp|in|d=2082,2083,2086,2087,2095,2096|s=10.0.0.0/8  # nxesec mgmt' \
#           >> /etc/csf/csf.allow
#   # 5.3  Reload + verify:
#         csf -r
#         nc -vz <external-IP> 2087    # should TIMEOUT
#         nc -vz <mgmt-IP>     2087    # should CONNECT
#
# ---- apf ----
#   # 5.1  Edit /etc/apf/conf.apf - remove 2082,2083,2086,2087,2095,2096 from IG_TCP_CPORTS
#   # 5.2  Allow trusted CIDRs back in:
#         echo 'tcp|in|d=2082,2083,2086,2087,2095,2096|s=10.0.0.0/8  # nxesec mgmt' \
#           >> /etc/apf/allow_hosts.rules
#   # 5.3  Reload + verify:
#         apf -r
#         iptables -nL INPUT | grep -E '208[2-7]|209[5-6]'   # only mgmt CIDRs ACCEPT
#         nc -vz <external-IP> 2087    # should TIMEOUT
#
# ============================================================================
# 6. UNINSTALL
# ============================================================================
#
#   # Remove rules from user.conf (preserves any operator rules outside our block):
#   sed -i '/^# === RULES ===/,$d' /etc/apache2/conf.d/modsec/modsec2.user.conf
#   apachectl -t && /usr/local/cpanel/scripts/restartsrv_httpd
#
#   # If you applied section 5 firewall changes, restore TCP_IN / IG_TCP_CPORTS
#   # to include 2082,2083,2086,2087,2095,2096 and reload (csf -r / apf -r).
#
# ============================================================================
# === RULES ===  (everything below appends to modsec2.user.conf)
# Rule ID range: 1500000-1500099 reserved for this mitigation set.
# Edit the @ipMatch trust list in each rule before reloading Apache.
# ============================================================================

# 1500010 - WhmScribe-A: WHM-token Authorization on the WHM JSON/UAPI/CpXfer
# dispatch paths. Triggers when the URI is /json-api/*, /execute/*, or any
# /acctxfer{rsync,stream,dsync}/* AND an Authorization: WHM header is present
# AND the source is not in the @ipMatch trust list. Edit the trust list
# in-place; the default ships loopback-only.
SecRule REQUEST_URI "@rx ^/(json-api|execute|acctxferrsync|acctxferstream|acctxferdsync)(/|$|\?)" \
    "id:1500010,phase:1,deny,status:403,log,auditlog,\
msg:'WhmScribe-A: WHM-token Authorization on WHM dispatch path',\
logdata:'path=%{REQUEST_URI} src=%{REMOTE_ADDR} ua=%{REQUEST_HEADERS.User-Agent}',\
tag:'nxesec-cpanel-bypass',tag:'nxesec-cpanel-bypass/whm-token',\
chain"
    SecRule REQUEST_HEADERS:Authorization "@rx (?i)^WHM[[:space:]]+\S" "chain"
        SecRule REMOTE_ADDR "!@ipMatch 127.0.0.0/8,::1"

# 1500020 - WhmScribe-A: WHM-token Authorization on WebSocket dispatch paths.
# Comment out if it interferes with legitimate WebSocket-based tooling
# (backups, monitors); confirm a substitute trust-list policy first.
SecRule REQUEST_URI "@rx ^/(Shell|CommandStream|MysqlDump|TarBackup|TarRestore|LogStreamer|PluginLog)(/|$|\?)" \
    "id:1500020,phase:1,deny,status:403,log,auditlog,\
msg:'WhmScribe-A: WHM-token Authorization on WebSocket dispatch path',\
logdata:'path=%{REQUEST_URI} src=%{REMOTE_ADDR} ua=%{REQUEST_HEADERS.User-Agent}',\
tag:'nxesec-cpanel-bypass',tag:'nxesec-cpanel-bypass/whm-token',\
chain"
    SecRule REQUEST_HEADERS:Authorization "@rx (?i)^WHM[[:space:]]+\S" "chain"
        SecRule REMOTE_ADDR "!@ipMatch 127.0.0.0/8,::1"

# 1500021 - WhmScribe-A: WHM-token Authorization on SSE dispatch paths.
SecRule REQUEST_URI "@rx ^/sse(/|$|\?)" \
    "id:1500021,phase:1,deny,status:403,log,auditlog,\
msg:'WhmScribe-A: WHM-token Authorization on SSE dispatch path',\
logdata:'path=%{REQUEST_URI} src=%{REMOTE_ADDR} ua=%{REQUEST_HEADERS.User-Agent}',\
tag:'nxesec-cpanel-bypass',tag:'nxesec-cpanel-bypass/whm-token',\
chain"
    SecRule REQUEST_HEADERS:Authorization "@rx (?i)^WHM[[:space:]]+\S" "chain"
        SecRule REMOTE_ADDR "!@ipMatch 127.0.0.0/8,::1"

# 1500030 - CVE-2026-41940: CRLF inside the base64-decoded Authorization: Basic
# payload. Apache forwards the base64 blob to cpsrvd as opaque bytes; on the
# server side cpsrvd decodes it and a CR or LF in the decoded string causes
# the password field to split into multiple key=value lines, which are then
# written verbatim to the on-disk session file when the session-encoder path
# is short-circuited (see 1500031 for the corresponding cookie shape). This
# rule decodes the base64 in phase:1 and rejects on any CR or LF in the
# decoded bytes. No legitimate Basic-auth value decodes to bytes containing
# CR or LF, so the rule has no trust-list bypass; applies to ALL paths,
# ALL sources.
SecRule REQUEST_HEADERS:Authorization "@rx (?i)^Basic[[:space:]]+(\S+)" \
    "id:1500030,phase:1,t:none,capture,chain,deny,status:403,log,auditlog,\
msg:'CVE-2026-41940: CRLF inside Authorization: Basic (session-file injection)',\
logdata:'src=%{REMOTE_ADDR} path=%{REQUEST_URI} ua=%{REQUEST_HEADERS.User-Agent}',\
tag:'nxesec-cpanel-bypass',tag:'nxesec-cpanel-bypass/cve-2026-41940'"
    SecRule TX:1 "@rx [\r\n]" "t:base64Decode"

# 1500031 - CVE-2026-41940 secondary: whostmgrsession cookie whose value
# does NOT end with `,<1-64 lowercase hex chars>`. Mirrors the inverse of
# Cpanel/Session/Load.pm get_ob_part() at line 122:
#     if ( $$session_name_ref =~ s/,([0-9a-f]{1,64})$// ) { $ob = $1; }
# Any cookie shape that fails that regex leaves $ob undef, which on line
# 93 short-circuits the encoder construction:
#     my $encoder = $ob && Cpanel::Session::Encoder->new('secret' => $ob);
# With the encoder skipped, saveSession() writes the password field
# verbatim - the gating condition for 1500030's CRLF write to land in the
# on-disk session file.
#
# Matching strategy: pull the cookie value via REQUEST_COOKIES (avoids
# parsing the full Cookie header), urlDecodeUni to handle %2c/%3a encoded
# forms, then negative-match the safe suffix regex `,[0-9a-f]{1,64}$`.
# This catches all five vulnerable shapes (no comma, trailing comma,
# non-hex tail, uppercase hex, >64-char hex tail) without hard-coding the
# session-name char class. Non-firing on the legitimate cookie shape.
#
# 1500030 closes the CVE chain on its own; this rule is defense-in-depth.
# If you need to baseline first before enforcing, change the parent
# action `deny,status:403` -> `pass`.
SecRule REQUEST_COOKIES:whostmgrsession "@rx ." \
    "id:1500031,phase:1,t:none,t:urlDecodeUni,chain,deny,status:403,log,auditlog,\
msg:'CVE-2026-41940 secondary: whostmgrsession cookie missing valid ,OBHEX suffix',\
logdata:'src=%{REMOTE_ADDR} path=%{REQUEST_URI} cookie=%{REQUEST_COOKIES.whostmgrsession}',\
tag:'nxesec-cpanel-bypass',tag:'nxesec-cpanel-bypass/no-ob'"
    SecRule REQUEST_COOKIES:whostmgrsession "!@rx ,[0-9a-f]{1,64}$" "t:none,t:urlDecodeUni"
